services:
  postgres:
    image: postgres:16
    container_name: wedding_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wedding
      POSTGRES_PASSWORD: wedding
      POSTGRES_DB: wedding
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wedding -d wedding"]
      interval: 3s
      timeout: 3s
      retries: 20
